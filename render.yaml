services:
  - type: web
    name: alertx-surveillance
    env: python
    plan: free # Changed to free tier
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /status
    envVars:
      - key: ALERTX_CAMERA
        value: "0" # Change this to your RTSP link in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_RECIPIENT
        sync: false
      - key: PUBLIC_URL
        sync: false # Set this to your Render URL (e.g. https://alertx.onrender.com)
