name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install and configure Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://iam-pradeepkumar:$HF_TOKEN@huggingface.co/spaces/iam-pradeepkumar/AlertX || true
          git remote set-url hf https://iam-pradeepkumar:$HF_TOKEN@huggingface.co/spaces/iam-pradeepkumar/AlertX
          git lfs push --all hf main || true
          git push --force hf main
